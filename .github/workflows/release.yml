name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OS image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/os/Dockerfile
          target: os
          push: true
          tags: ghcr.io/risi-au/companyos-os:${{ github.ref_name }}
          cache-from: type=gha,scope=companyos-os
          cache-to: type=gha,scope=companyos-os,mode=max

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/os/Dockerfile
          target: migrate
          push: true
          tags: ghcr.io/risi-au/companyos-migrate:${{ github.ref_name }}
          cache-from: type=gha,scope=companyos-migrate
          cache-to: type=gha,scope=companyos-migrate,mode=max
