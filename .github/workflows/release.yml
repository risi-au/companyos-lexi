# Release (Lexi OS) — a FORK of CompanyOS. This pipeline is deliberately isolated
# from cos-staging: it builds distinct GHCR images (companyos-lexi-{os,migrate}),
# deploys to ~/lexi on the VPS (its own compose project, network, volumes and
# published port), and smoke-tests https://lexi.risi.au. It must NEVER touch
# cos-staging.risi.au, the ~/app stack, or the companyos-{os,migrate} images.
#
# Requires repo secrets: LEXI_SSH_HOST, LEXI_SSH_USER, LEXI_SSH_KEY.
# See docs/LEXI-DEPLOY.md for the one-time VPS + Cloudflare + secrets setup.
name: Release (Lexi OS)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "**/*.md"
      - "docs/**"

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - name: Compute image tag
        id: image_tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=main" >> "$GITHUB_OUTPUT"
          fi

  build-arm64-images:
    runs-on: ubuntu-24.04-arm
    needs: release
    outputs:
      image_tag: ${{ steps.image_tag.outputs.tag }}
      os_digest: ${{ steps.build_os.outputs.digest }}
      migrate_digest: ${{ steps.build_migrate.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Export image tag
        id: image_tag
        shell: bash
        env:
          RELEASE_IMAGE_TAG: ${{ needs.release.outputs.image_tag }}
        run: echo "tag=${RELEASE_IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OS image
        id: build_os
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/os/Dockerfile
          target: os
          push: true
          platforms: linux/arm64
          tags: ghcr.io/risi-au/companyos-lexi-os:${{ steps.image_tag.outputs.tag }}
          cache-from: type=gha,scope=companyos-lexi-os-arm64
          cache-to: type=gha,scope=companyos-lexi-os-arm64,mode=max

      - name: Build and push migrate image
        id: build_migrate
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/os/Dockerfile
          target: migrate
          push: true
          platforms: linux/arm64
          tags: ghcr.io/risi-au/companyos-lexi-migrate:${{ steps.image_tag.outputs.tag }}
          cache-from: type=gha,scope=companyos-lexi-migrate-arm64
          cache-to: type=gha,scope=companyos-lexi-migrate-arm64,mode=max

  deploy-lexi:
    runs-on: ubuntu-latest
    needs: build-arm64-images
    concurrency: lexi-deploy
    steps:
      - uses: actions/checkout@v4

      - name: Validate Lexi SSH secrets
        shell: bash
        env:
          LEXI_SSH_HOST: ${{ secrets.LEXI_SSH_HOST }}
          LEXI_SSH_USER: ${{ secrets.LEXI_SSH_USER }}
          LEXI_SSH_KEY: ${{ secrets.LEXI_SSH_KEY }}
        run: |
          missing=0
          for secret_name in LEXI_SSH_HOST LEXI_SSH_USER LEXI_SSH_KEY; do
            if [[ -z "${!secret_name}" ]]; then
              echo "::error title=Missing GitHub secret::${secret_name} is required for deploy-lexi"
              missing=1
            fi
          done
          exit "$missing"

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LEXI_SSH_KEY }}

      - name: Trust Lexi host key
        shell: bash
        env:
          LEXI_SSH_HOST: ${{ secrets.LEXI_SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "$LEXI_SSH_HOST" >> ~/.ssh/known_hosts

      # The repo is the source of truth for the Lexi stack definition. Assets land
      # in ~/lexi (NOT ~/app, which is cos-staging).
      - name: Sync compose assets to Lexi
        shell: bash
        env:
          LEXI_SSH_HOST: ${{ secrets.LEXI_SSH_HOST }}
          LEXI_SSH_USER: ${{ secrets.LEXI_SSH_USER }}
        run: |
          ssh "${LEXI_SSH_USER}@${LEXI_SSH_HOST}" "mkdir -p ~/lexi/backup"
          scp infra/docker-compose.lexi.yml infra/postgres-init.sql infra/litellm.config.yaml \
            "${LEXI_SSH_USER}@${LEXI_SSH_HOST}:lexi/"
          scp infra/backup/Dockerfile infra/backup/backup.sh \
            "${LEXI_SSH_USER}@${LEXI_SSH_HOST}:lexi/backup/"

      - name: Deploy Lexi over SSH
        id: deploy
        shell: bash
        env:
          DEPLOY_TAG: ${{ needs['build-arm64-images'].outputs.image_tag }}
          LEXI_SSH_HOST: ${{ secrets.LEXI_SSH_HOST }}
          LEXI_SSH_USER: ${{ secrets.LEXI_SSH_USER }}
        run: |
          set -o pipefail
          remote_log="$(mktemp)"

          set +e
          ssh "${LEXI_SSH_USER}@${LEXI_SSH_HOST}" "LEXI_DEPLOY_TAG=${DEPLOY_TAG@Q} bash -se" <<'REMOTE_SCRIPT' | tee "$remote_log"
          set -Eeuo pipefail

          cd ~/lexi

          touch .env
          cp .env .env.bak
          if grep -q '^LEXI_TAG=' .env; then
            sed -i "s/^LEXI_TAG=.*/LEXI_TAG=${LEXI_DEPLOY_TAG}/" .env
          else
            printf '\nLEXI_TAG=%s\n' "$LEXI_DEPLOY_TAG" >> .env
          fi

          OS_PORT="$(grep -E '^OS_PORT=' .env | tail -n 1 | cut -d= -f2)"
          OS_PORT="${OS_PORT:-3001}"

          # Pull registry images only — backup is built locally (pull_policy: build).
          docker compose --env-file .env -f docker-compose.lexi.yml pull \
            postgres litellm n8n migrate os brain-cron
          set +e
          docker compose --env-file .env -f docker-compose.lexi.yml up -d --build
          compose_up_status="$?"
          set -e

          migrate_cid="$(docker compose --env-file .env -f docker-compose.lexi.yml ps --all -q migrate | tail -n 1)"
          if [[ -z "$migrate_cid" ]]; then
            echo "LEXI_MIGRATE_RESULT=failed"
            echo "::error title=Missing migrate container::docker compose did not return a migrate container id"
            docker compose --env-file .env -f docker-compose.lexi.yml logs --no-color migrate || true
            exit 1
          fi

          migrate_exit="$(docker wait "$migrate_cid" | tail -n 1)"
          if [[ "$migrate_exit" != "0" ]]; then
            echo "LEXI_MIGRATE_RESULT=failed"
            echo "::error title=Lexi migrate failed::migrate exited with ${migrate_exit}"
            docker compose --env-file .env -f docker-compose.lexi.yml logs --no-color migrate || true
            exit 1
          fi
          echo "LEXI_MIGRATE_RESULT=success"

          if [[ "$compose_up_status" != "0" ]]; then
            echo "::error title=Lexi compose up failed::docker compose up -d exited with ${compose_up_status}"
            docker compose --env-file .env -f docker-compose.lexi.yml logs --no-color migrate || true
            exit "$compose_up_status"
          fi

          curl -fsS --max-time 10 "http://127.0.0.1:${OS_PORT}/" >/dev/null
          echo "LEXI_INTERNAL_SMOKE=success"
          REMOTE_SCRIPT
          ssh_status="${PIPESTATUS[0]}"
          set -e

          if grep -q '^LEXI_MIGRATE_RESULT=success$' "$remote_log"; then
            echo "migrate_result=success" >> "$GITHUB_OUTPUT"
          elif grep -q '^LEXI_MIGRATE_RESULT=failed$' "$remote_log"; then
            echo "migrate_result=failed" >> "$GITHUB_OUTPUT"
          else
            echo "migrate_result=unknown" >> "$GITHUB_OUTPUT"
          fi

          if grep -q '^LEXI_INTERNAL_SMOKE=success$' "$remote_log"; then
            echo "internal_smoke_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "internal_smoke_status=not completed" >> "$GITHUB_OUTPUT"
          fi

          exit "$ssh_status"

      - name: External Lexi smoke
        id: external_smoke
        shell: bash
        run: |
          set +e
          curl -fsS --max-time 20 https://lexi.risi.au >/dev/null
          smoke_status="$?"
          set -e

          if [[ "$smoke_status" == "0" ]]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

          exit "$smoke_status"

      - name: Write Lexi deploy summary
        if: always()
        shell: bash
        env:
          DEPLOY_TAG: ${{ needs['build-arm64-images'].outputs.image_tag }}
          OS_DIGEST: ${{ needs['build-arm64-images'].outputs.os_digest }}
          MIGRATE_DIGEST: ${{ needs['build-arm64-images'].outputs.migrate_digest }}
          MIGRATE_RESULT: ${{ steps.deploy.outputs.migrate_result || 'not run' }}
          INTERNAL_SMOKE_STATUS: ${{ steps.deploy.outputs.internal_smoke_status || 'not run' }}
          EXTERNAL_SMOKE_STATUS: ${{ steps.external_smoke.outputs.status || 'not run' }}
        run: |
          {
            echo "## Lexi deploy"
            echo
            echo "- Tag: \`${DEPLOY_TAG}\`"
            echo "- OS image digest: \`${OS_DIGEST}\`"
            echo "- Migrate image digest: \`${MIGRATE_DIGEST}\`"
            echo "- Migrate result: ${MIGRATE_RESULT}"
            echo "- Internal smoke: ${INTERNAL_SMOKE_STATUS}"
            echo "- External smoke: ${EXTERNAL_SMOKE_STATUS}"
          } >> "$GITHUB_STEP_SUMMARY"
