name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "**/*.md"
      - "docs/**"

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - name: Compute image tag
        id: image_tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=main" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OS image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/os/Dockerfile
          target: os
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/risi-au/companyos-os:${{ steps.image_tag.outputs.tag }}
          cache-from: type=gha,scope=companyos-os
          cache-to: type=gha,scope=companyos-os,mode=max

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/os/Dockerfile
          target: migrate
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/risi-au/companyos-migrate:${{ steps.image_tag.outputs.tag }}
          cache-from: type=gha,scope=companyos-migrate
          cache-to: type=gha,scope=companyos-migrate,mode=max
