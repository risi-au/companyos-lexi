name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "**/*.md"
      - "docs/**"

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image_tag.outputs.tag }}
      os_digest: ${{ steps.build_os.outputs.digest }}
      migrate_digest: ${{ steps.build_migrate.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - name: Compute image tag
        id: image_tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=main" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OS image
        id: build_os
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/os/Dockerfile
          target: os
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/risi-au/companyos-os:${{ steps.image_tag.outputs.tag }}
          cache-from: type=gha,scope=companyos-os
          cache-to: type=gha,scope=companyos-os,mode=max

      - name: Build and push migrate image
        id: build_migrate
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/os/Dockerfile
          target: migrate
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/risi-au/companyos-migrate:${{ steps.image_tag.outputs.tag }}
          cache-from: type=gha,scope=companyos-migrate
          cache-to: type=gha,scope=companyos-migrate,mode=max

  deploy-staging:
    runs-on: ubuntu-latest
    needs: release
    concurrency: staging-deploy
    steps:
      - uses: actions/checkout@v4

      - name: Validate staging SSH secrets
        shell: bash
        env:
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          missing=0
          for secret_name in STAGING_SSH_HOST STAGING_SSH_USER STAGING_SSH_KEY; do
            if [[ -z "${!secret_name}" ]]; then
              echo "::error title=Missing GitHub secret::${secret_name} is required for deploy-staging"
              missing=1
            fi
          done
          exit "$missing"

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Trust staging host key
        shell: bash
        env:
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "$STAGING_SSH_HOST" >> ~/.ssh/known_hosts

      # The repo is the source of truth for the staging stack definition; without
      # this sync the VPS runs whatever compose file was last hand-placed there
      # (which is how staging postgres missed the pgvector image switch).
      - name: Sync compose assets to staging
        shell: bash
        env:
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
        run: |
          ssh "${STAGING_SSH_USER}@${STAGING_SSH_HOST}" "mkdir -p ~/app"
          scp infra/docker-compose.prod.yml infra/postgres-init.sql infra/litellm.config.yaml \
            "${STAGING_SSH_USER}@${STAGING_SSH_HOST}:app/"

      - name: Deploy staging over SSH
        id: deploy
        shell: bash
        env:
          DEPLOY_TAG: ${{ needs.release.outputs.image_tag }}
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
        run: |
          set -o pipefail
          remote_log="$(mktemp)"

          set +e
          ssh "${STAGING_SSH_USER}@${STAGING_SSH_HOST}" "COMPANYOS_DEPLOY_TAG=${DEPLOY_TAG@Q} bash -se" <<'REMOTE_SCRIPT' | tee "$remote_log"
          set -Eeuo pipefail

          cd ~/app

          touch .env
          cp .env .env.bak
          if grep -q '^COMPANYOS_TAG=' .env; then
            sed -i "s/^COMPANYOS_TAG=.*/COMPANYOS_TAG=${COMPANYOS_DEPLOY_TAG}/" .env
          else
            printf '\nCOMPANYOS_TAG=%s\n' "$COMPANYOS_DEPLOY_TAG" >> .env
          fi

          docker compose --env-file .env -f docker-compose.prod.yml pull
          set +e
          docker compose --env-file .env -f docker-compose.prod.yml up -d
          compose_up_status="$?"
          set -e

          migrate_cid="$(docker compose --env-file .env -f docker-compose.prod.yml ps --all -q migrate | tail -n 1)"
          if [[ -z "$migrate_cid" ]]; then
            echo "COMPANYOS_MIGRATE_RESULT=failed"
            echo "::error title=Missing migrate container::docker compose did not return a migrate container id"
            docker compose --env-file .env -f docker-compose.prod.yml logs --no-color migrate || true
            exit 1
          fi

          migrate_exit="$(docker wait "$migrate_cid" | tail -n 1)"
          if [[ "$migrate_exit" != "0" ]]; then
            echo "COMPANYOS_MIGRATE_RESULT=failed"
            echo "::error title=Staging migrate failed::migrate exited with ${migrate_exit}"
            docker compose --env-file .env -f docker-compose.prod.yml logs --no-color migrate || true
            exit 1
          fi
          echo "COMPANYOS_MIGRATE_RESULT=success"

          if [[ "$compose_up_status" != "0" ]]; then
            echo "::error title=Staging compose up failed::docker compose up -d exited with ${compose_up_status}"
            docker compose --env-file .env -f docker-compose.prod.yml logs --no-color migrate || true
            exit "$compose_up_status"
          fi

          curl -fsS --max-time 10 http://127.0.0.1:3000/ >/dev/null
          echo "COMPANYOS_INTERNAL_SMOKE=success"
          REMOTE_SCRIPT
          ssh_status="${PIPESTATUS[0]}"
          set -e

          if grep -q '^COMPANYOS_MIGRATE_RESULT=success$' "$remote_log"; then
            echo "migrate_result=success" >> "$GITHUB_OUTPUT"
          elif grep -q '^COMPANYOS_MIGRATE_RESULT=failed$' "$remote_log"; then
            echo "migrate_result=failed" >> "$GITHUB_OUTPUT"
          else
            echo "migrate_result=unknown" >> "$GITHUB_OUTPUT"
          fi

          if grep -q '^COMPANYOS_INTERNAL_SMOKE=success$' "$remote_log"; then
            echo "internal_smoke_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "internal_smoke_status=not completed" >> "$GITHUB_OUTPUT"
          fi

          exit "$ssh_status"

      - name: External staging smoke
        id: external_smoke
        shell: bash
        run: |
          set +e
          curl -fsS --max-time 20 https://cos-staging.risi.au >/dev/null
          smoke_status="$?"
          set -e

          if [[ "$smoke_status" == "0" ]]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

          exit "$smoke_status"

      - name: Write staging deploy summary
        if: always()
        shell: bash
        env:
          DEPLOY_TAG: ${{ needs.release.outputs.image_tag }}
          OS_DIGEST: ${{ needs.release.outputs.os_digest }}
          MIGRATE_DIGEST: ${{ needs.release.outputs.migrate_digest }}
          MIGRATE_RESULT: ${{ steps.deploy.outputs.migrate_result || 'not run' }}
          INTERNAL_SMOKE_STATUS: ${{ steps.deploy.outputs.internal_smoke_status || 'not run' }}
          EXTERNAL_SMOKE_STATUS: ${{ steps.external_smoke.outputs.status || 'not run' }}
        run: |
          {
            echo "## Staging deploy"
            echo
            echo "- Tag: \`${DEPLOY_TAG}\`"
            echo "- OS image digest: \`${OS_DIGEST}\`"
            echo "- Migrate image digest: \`${MIGRATE_DIGEST}\`"
            echo "- Migrate result: ${MIGRATE_RESULT}"
            echo "- Internal smoke: ${INTERNAL_SMOKE_STATUS}"
            echo "- External smoke: ${EXTERNAL_SMOKE_STATUS}"
          } >> "$GITHUB_STEP_SUMMARY"
