version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cos_brain}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  affine:
    image: toeverything/affine-self-hosted:stable
    container_name: cos-affine
    restart: unless-stopped
    ports:
      - "3010:3010"
    volumes:
      - affine_data:/app/data
    environment:
      - AFFINE_SERVER_PORT=3010
      # Configure database connection, auth, etc. in production
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    image: n8nio/n8n:latest
    container_name: cos-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres

  # Hermes placeholder - will be enabled once we have install method / image
  # hermes:
  #   build: ./hermes
  #   container_name: cos-hermes
  #   restart: unless-stopped
  #   ports:
  #     - "8080:8080"
  #   volumes:
  #     - hermes_data:/data
  #   depends_on:
  #     - postgres

volumes:
  postgres_data:
  affine_data:
  n8n_data:


