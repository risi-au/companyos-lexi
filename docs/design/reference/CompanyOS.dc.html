  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n-height:52px;padding:9px 10px;border-radius:6px;border:1px solid var(--borderstrong);background:var(--bg);color:var(--fg);font-size:13px;font-family:'Gantari',sans-serif;line-height:1.5;resize:vertical;outline-color:var(--primary)\">{{ f.a }}<\u002Ftextarea>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <sc-if value=\"{{ s3 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div>\n                    <div style=\"font-size:12px;font-weight:600;color:var(--primary);letter-spacing:.02em;margin-bottom:4px\">STEP 3<\u002Fdiv>\n                    <h2 style=\"font-size:20px;font-weight:600;margin:0 0 4px;letter-spacing:-.01em\">History &amp; starting point<\u002Fh2>\n                    <div style=\"font-size:13px;color:var(--mutedfg);margin-bottom:16px\">Seed the new scope with what we already know.<\u002Fdiv>\n                    <div data-stage=\"1\" style=\"padding:13px 0;border-top:1px solid var(--border)\">\n                      <div style=\"display:flex;align-items:center;gap:8px;font-weight:600;font-size:13.5px;margin-bottom:10px\"><span style=\"width:20px;height:20px;flex:none;border-radius:50%;background:var(--muted);display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:11px\">1<\u002Fspan>Pull related history<\u002Fdiv>\n                      <div style=\"display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--borderstrong);border-radius:6px;background:var(--bg);font-size:13px;color:var(--mutedfg);max-width:340px\">\n                        <svg style=\"width:14px;height:14px;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none\"><use href=\"#search\"><\u002Fuse><\u002Fsvg>indya<\u002Fdiv>\n                      <div style=\"display:flex;flex-direction:column;gap:8px;margin-top:12px\">\n                        <sc-for list=\"{{ history }}\" as=\"h\" hint-placeholder-count=\"2\">\n                          <div onclick=\"{{ h.onClick }}\" style=\"display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid {{ h.bd }};border-radius:8px;background:{{ h.bg }};cursor:pointer\" style-hover=\"border-color:var(--borderstrong)\">\n                            <span style=\"width:15px;height:15px;border:1.5px solid {{ h.boxBd }};background:{{ h.boxBg }};border-radius:4px;flex:none;display:grid;place-items:center\">\n                              <sc-if value=\"{{ h.sel }}\" hint-placeholder-val=\"{{ false }}\"><svg style=\"width:11px;height:11px;stroke:var(--primaryfg);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;fill:none\"><use href=\"#check\"><\u002Fuse><\u002Fsvg><\u002Fsc-if>\n                            <\u002Fspan>\n                            <div style=\"flex:1;min-width:0\"><div style=\"font-size:13px;font-weight:500;font-family:'JetBrains Mono',monospace\">{{ h.path }}<\u002Fdiv><div style=\"font-size:12px;color:var(--mutedfg);margin-top:2px\">{{ h.sub }}<\u002Fdiv><\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div data-stage=\"1\" style=\"padding:13px 0;border-top:1px solid var(--border)\">\n                      <div style=\"display:flex;align-items:center;gap:8px;font-weight:600;font-size:13.5px;margin-bottom:7px\"><span style=\"width:20px;height:20px;flex:none;border-radius:50%;background:var(--muted);display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:11px\">2<\u002Fspan>Adopt a reuse pattern <span style=\"font-size:11px;color:var(--mutedfg);font-weight:400\">optional<\u002Fspan><\u002Fdiv>\n                      <div onclick=\"{{ toggleReuse }}\" style=\"display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid {{ reuseBd }};border-radius:8px;background:{{ reuseBg }};cursor:p font-size:11px\">1<\u002Fspan>Copy the interview pack<\u002Fdiv>\n                      <div style=\"font-size:12.5px;color:var(--mutedfg);line-height:1.5;margin-left:29px\">Includes: framing answers · 2 history digests · scope tree position.<br><b style=\"color:var(--fg)\">Never includes credential values<\u002Fb> — names only.<\u002Fdiv>\n                      <div style=\"display:flex;gap:8px;margin-top:10px;margin-left:29px\">\n                        <div data-copybtn=\"pack\" onclick=\"{{ copyPack }}\" style=\"display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;gap:7px;min-width:120px;min-height:36px;padding:0 14px;border-radius:6px;font-size:13px;font-weight:500;background:{{ packBg }};color:{{ packFg }};border:1px solid transparent;box-shadow:0 4px 0 var(--primarydark);transition:transform .12s ease,box-shadow .12s ease;cursor:pointer\" style-hover=\"background:var(--primaryhover)\" style-active=\"transform:translateY(3px);box-shadow:0 1px 0 var(--primarydark)\">\n                          <svg style=\"width:14px;height:14px;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none\"><use href=\"#{{ packIcon }}\"><\u002Fuse><\u002Fsvg>{{ packLabel }}<\u002Fdiv>\n                        <div data-copybtn=\"mcp\" onclick=\"{{ copyMcp }}\" style=\"display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;gap:7px;min-width:172px;min-height:36px;padding:0 14px;border-radius:6px;font-size:13px;font-weight:500;background:var(--surface);color:{{ mcpFg }};border:1px solid var(--borderstrong);cursor:pointer\" style-hover=\"background:var(--hover)\">\n                          <svg style=\"width:14px;height:14px;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none\"><use href=\"#{{ mcpIcon }}\"><\u002Fuse><\u002Fsvg>{{ mcpLabel }}<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div data-stage=\"1\" style=\"padding:13px 0;border-top:1px solid var(--border)\">\n                      <div style=\"display:flex;align-items:center;gap:9px;font-weight:600;font-size:13.5px;margin-bottom:7px\"><span style=\"width:20px;height:20px;flex:none;border-radius:50%;background:var(--muted);display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:11px\">2<\u002Fspan>Run it in your external LLM<\u002Fdiv>\n                      <div style=\"font-size:12.5px;color:var(--mutedfg);line-height:1.5;margin-left:29px\">Paste into your assistant, answer its questions, then copy the whole final reply.<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div data-stage=\"1\" style=\"padding:13px 0;border-top:1px solid var(--border)\">\n                      <div style=\"display:flex;align-items:center;gap:9px;font-weight:600;font-size:13.5px;margin-bottom:7px\"><span style=\"width:20px;height:20px;flex:none;border-radius:50%;background:var(--muted);display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:11px\">3<\u002Fspan>Paste the reply back<\u002Fdiv>\n                      <sc-if value=\"{{ notPasted }}\" hint-placeholder-val=\"{{ true }}\">\n                        <div onclick=\"{{ simulatePaste }}\" style=\"border:1.5px dashed var(--borderstrong);border-radius:6px;background:var(--bg);padding:16px;min-height:56px;color:var(--mutedfg);font-size:12.5px;margin-left:29px;cursor:pointer\" style-hover=\"border-color:var(--primary);color:var(--fg)\">Paste the entire reply here — don't trim it. (Click to simulate a paste.)<\u002Fdiv>\n                      <\u002Fsc-if>\n                      <sc-if value=\"{{ pasted }}\" hint-placeholder-val=\"{{ false }}\">\n                        <div style=\"margin-left:29px\">\n                          <div style=\"border:1px solid var(--border);border-radius:6px;background:var(--bg);padding:12px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--mutedfg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">…final packet ```json { \"provision\": { \"modules\": [\"dashboard\",\"docs\",\"canvas\"] … ``` 7.2 KB<\u002Fdiv>\n                          <ul style=\"list-style:none;margin:10px 0 0;padding:0;display:flex;flex-direction:column;gap:6px;font-size:12.5px\">\n                            <li data-pre=\"1\" style=\"display:flex;align-items:center;gap:8px;color:var(--ok)\"><svg style=\"width:13px;height:13px;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;fill:none\"><use href=\"#check\"><\u002Fuse><\u002Fsvg>Found fenced JSON packet<\u002Fli>\n                            <li data-pre=\"1\" style=\"display:flex;align-items:center;gap:8px;color:var(--ok)\"><svg style=\"width:13px;height:13px;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;fill:none\"><use href=\"#check\"><\u002Fuse><\u002Fsvg>Provision spec present · docs 4 · tasks 6<\u002Fli>\n                            <li data-pre=\"1\" style=\"display:flex;align-items:center;gap:8px;color:var(--warn)\"><svg style=\"width:13px;height:13px;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none\"><use href=\"#alert\"><\u002Fuse><\u002Fsvg>No wiki updates found — that can be fine<\u002Fli>\n                          <\u002Ful>\n                        <\u002Fdiv>\n                      <\u002Fsc-if>\n                      <sc-if value=\"{{ notPasted }}\" hint-placeholder-val=\"{{ true }}\">\n                        <div style=\"display:flex;gap:9px;border-radius:6px;padding:10px 12px;font-size:12.5px;line-height:1.5;margin:12px 0 0 29px;background:var(--warnbg);color:var(--warn);border:1px solid color-mix(in srgb,var(--warn) 30%,transparent)\">\n                          <svg style=\"width:14px;height:14px;flex:none;margin-top:1px;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none\"><use href=\"#alert\"><\u002Fuse><\u002Fsvg>\n                          <span>No structured packet? You can still proceed — every review field starts empty and is filled by hand.<\u002Fspan>\n                        <\u002Fdiv>\n                      <\u002Fsc-if>\n                      <div style=\"display:flex;align-items:center;gap:7px;font-size:12px;color:var(--mutedfg);margin:14px 0 0 29px;border-top:1px dashed var(--border);padding-top:10px;cursor:pointer\" style-hover=\"color:var(--fg)\">\n                        <svg style=\"width:12px;height:12px;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none\"><use href=\"#chev\"><\u002Fuse><\u002Fsvg>What was sent (pack snapshot)<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <sc-if value=\"{{ s5 }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div>\n                    <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:4px\"><span style=\"display:inline-flex;align-items:center;white-space:nowrap;gap:6px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;color:var(--info);background:var(--infobg)\">STEP 5<\u002Fspan><\u002Fdiv>\n                    <h2 style=\"font-size:20px;font-weight:600;margin:0 0 16px;letter-spacing:-.01em\">This will create<\u002Fh2>\n                    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:0 24px\">\n                      <sc-for list=\"{{ arts }}\" as=\"a\" hint-placeholder-count=\"4\">\n                        <div data-stage=\"1\" style=\"padding:12px 0;border-top:1px solid var(--border)\">\n                          <div style=\"display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:6px\">{{ a.title }}<span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--mutedfg)\">{{ a.count }}<\u002Fspan><\u002Fdiv>\n                          <div style=\"font-size:12.5px;color:var(--mutedfg);line-height:1.6\">{{ a.body }}<\u002Fdiv>\n                          <a href=\"#\" style=\"font-size:11.5px;margin-top:6px;display:inline-block\">view source<\u002Fa>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <div data-stage=\"1\" style=\"margin-top:16px\">\n                      <div style=\"font-weight:600;font-size:13.5px\">Open questions <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--mutedfg)\">{{ qLeft }}<\u002Fspan><\u002Fdiv>\n                      <div style=\"font-size:12px;color:var(--mutedfg);margin-top:2px\">Each must be checked or dismissed before approval.<\u002Fdiv>\n                      <div style=\"display:flex;flex-direction:column;gap:7px;margin-top:10px\">\n                        <sc-for list=\"{{ questions }}\" as=\"q\" hint-placeholder-count=\"3\">\n                          <div onclick=\"{{ q.onClick }}\" style=\"display:flex;align-items:center;gap:9px;font-size:12.5px;cursor:pointer;padding:1px 0\">\n                            <sc-if value=\"{{ q.burst }}\" hint-placeholder-val=\"{{ false }}\">\n                              <span style=\"width:16px;height:16px;flex:none;border-radius:50%;background:var(--ok);display:grid;place-items:center;animation:popIn .4s cubic-bezier(.2,.7,.4,1.08) both,ringOut .55s ease-out both\"><svg style=\"width:10px;height:10px;stroke:var(--primaryfg);stroke-width:3;stroke-linecap:round;stroke-linejoin:round;fill:none\"><use href=\"#check\"><\u002Fuse><\u002Fsvg><\u002Fspan>\n                              <span style=\"color:var(--faded);text-decoration:line-through\">{{ q.t }}<\u002Fspan>\n                              <span style=\"color:var(--ok);font-size:10.5px;font-weight:700;white-space:nowrap;animation:riseFade 1.8s ease-out both\">{{ q.cheer }}<\u002Fspan>\n                            <\u002Fsc-if>\n                            <sc-if value=\"{{ q.settled }}\" hint-placehold order)\">{{ e.what }} <span style=\"font-family:'JetBrains Mono',monospace;color:var(--mutedfg);font-size:12px\">{{ e.path }}<\u002Fspan><\u002Ftd>\n                        <td style=\"padding:10px;border-bottom:1px solid var(--border);text-align:right;color:var(--mutedfg);font-variant-numeric:tabular-nums;width:70px\">{{ e.at }}<\u002Ftd>\n                        <td style=\"padding:10px;border-bottom:1px solid var(--border);text-align:right;width:80px\"><a href=\"#\" style=\"font-size:12px;color:var(--mutedfg)\" style-hover=\"color:var(--primary)\">payload<\u002Fa><\u002Ftd>\n                      <\u002Ftr>\n                    \n                  <\u002Ftbody>\n                <\u002Ftable>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ aEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px;padding:80px 20px;text-align:center\">\n                <svg style=\"width:20px;height:20px;stroke:var(--mutedfg);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none\"><use href=\"#{{ aEmptyIcon }}\"><\u002Fuse><\u002Fsvg>\n                <div style=\"font-size:14px;font-weight:600\">{{ aEmptyTitle }}<\u002Fdiv>\n                <div style=\"font-size:13px;color:var(--mutedfg);max-width:400px\">{{ aEmptyBody }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ TOASTS ============ -->\n<div style=\"position:fixed;right:16px;top:60px;display:flex;flex-direction:column;gap:8px;z-index:60\">\n  <sc-for list=\"{{ toasts }}\" as=\"t\" hint-placeholder-count=\"0\">\n    <div data-toast=\"{{ t.id }}\" style=\"display:flex;align-items:center;gap:10px;background:var(--raised);border:1px solid var(--border);border-left:3px solid {{ t.edge }};border-radius:8px;box-shadow:var(--shadow);padding:11px 14px;min-width:280px;max-width:380px\">\n      <svg style=\"width:15px;height:15px;flex:none;stroke:{{ t.edge }};stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;fill:none\"><use href=\"#{{ t.icon }}\"><\u002Fuse><\u002Fsvg>\n      <span style=\"font-size:13px;line-height:1.4;flex:1\">{{ t.msg }}<\u002Fspan>\n      <svg onclick=\"{{ t.onClose }}\" style=\"width:13px;height:13px;flex:none;stroke:var(--mutedfg);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none;cursor:pointer\" style-hover=\"stroke:var(--fg)\"><use href=\"#x\"><\u002Fuse><\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n<\u002Fdiv>\n\n<!-- ============ CONFIRM DIALOG ============ -->\n<sc-if value=\"{{ hasConfirm }}\" hint-placeholder-val=\"{{ false }}\">\n  <div onclick=\"{{ cancelConfirm }}\" style=\"position:fixed;inset:0;background:var(--overlay);z-index:50;display:grid;place-items:center\">\n    <div data-confirmcard=\"1\" onclick=\"{{ swallow }}\" style=\"background:var(--raised);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:20px;width:400px;max-width:90vw\">\n      <div style=\"font-size:16px;font-weight:600\">{{ confirmTitle }}<\u002Fdiv>\n      <div style=\"font-size:13px;color:var(--mutedfg);margin-top:8px;line-height:1.55\">{{ confirmBody }}<\u002Fdiv>\n      <div style=\"display:flex;justify-content:flex-end;gap:8px;margin-top:18px\">\n        <div onclick=\"{{ cancelConfirm }}\" style=\"display:inline-flex;align-items:center;white-space:nowrap;min-height:36px;padding:0 14px;border-radius:6px;font-size:13px;font-weight:500;background:var(--surface);border:1px solid var(--borderstrong);cursor:pointer\" style-hover=\"background:var(--hover)\">Cancel<\u002Fdiv>\n        <div onclick=\"{{ runConfirm }}\" style=\"display:inline-flex;align-items:center;white-space:nowrap;min-height:36px;padding:0 14px;border-radius:6px;font-size:13px;font-weight:500;background:var(--err);color:#fbf9f4;box-shadow:0 4px 0 color-mix(in srgb,var(--err) 65%,black);transition:transform .12s ease,box-shadow .12s ease;cursor:pointer\" style-active=\"transform:translateY(3px);box-shadow:0 1px 0 color-mix(in srgb,var(--err) 65%,black)\">{{ confirmLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;auto&quot;,&quot;light&quot;,&quot;green&quot;,&quot;charcoal&quot;],&quot;default&quot;:&quot;auto&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Appearance&quot;},&quot;motion&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;min&quot;:0,&quot;max&quot;:3,&quot;step&quot;:1,&quot;default&quot;:2,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Behavior&quot;},&quot;view&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;scope&quot;,&quot;wizard&quot;,&quot;admin&quot;],&quot;default&quot;:&quot;scope&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Behavior&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    view: null, theme: null,\n    scopeTab: 'overview', adminTab: 'overview', actSeg: 'events',\n    sel: 'seo', expanded: { indya: true, marketing: true },\n    step: 4, maxStep: 4, menuOpen: false, nav: false,\n    copied: {}, pasted: false, reuse: true,\n    histSel: { 0: true, 1: false },\n    burstQ: null,\n    qs: [\n      { t: 'Confirm target market is AU-only', done: true },\n      { t: 'Who owns the GA4 property?', done: false },\n      { t: 'Budget ceiling for paid tools?', done: false }\n    ],\n    prov: [], live: false, provRunning: false,\n    toasts: [], confirm: null,\n    keys: [\n      { alias: 'seo-agent', by: 'Priya', usage: '$40 / $120' },\n      { alias: 'ops-runner', by: 'Rishi', usage: '$8 / $50' }\n    ],\n    users: [\n      { name: 'Priya Nair', role: 'Editor', on: true },\n      { name: 'Jae Okafor', role: 'Editor', on: false },\n      { name: 'seo-agent', role: 'Agent', on: true }\n    ]\n  };\n\n  // ---------- helpers ----------\n  curView() { return this.state.view || this.props.view || 'scope'; }\n  curTheme() { return this.state.theme || this.props.theme || 'auto'; }\n  applyTheme() {\n    const m = this.curTheme();\n    let t = m, bg = '';\n    if (m === 'auto') {\n      const h = new Date().getHours();\n      if (h >= 21 || h < 5) t = 'charcoal';\n      else { t = 'light'; if (h < 8) bg = '#f3ead8'; else if (h >= 17) bg = '#f0dcc4'; }\n    }\n    document.body.dataset.theme = t;\n    document.body.style.setProperty('--bg', bg);\n  }\n  df() { const m = this.props.motion == null ? 2 : this.props.motion; return [0, .7, 1, 1.4][m] || 1; }\n  rm() {\n    try { if (matchMedia('(prefers-reduced-motion: reduce)').matches) return true; } catch (e) {}\n    return this.df() === 0;\n  }\n  anim(fn) {\n    if (this.rm()) return;\n    const go = (n) => { if (window.gsap) fn(window.gsap); else if (n < 40) setTimeout(() => go(n + 1), 100); };\n    go(0);\n  }\n\n  // ---------- lifecycle ----------\n  componentDidMount() {\n    this.applyTheme();\n    this._circ = setInterval(() => { if (this.curTheme() === 'auto') this.applyTheme(); }, 60000);\n    this._key = (e) => { if (e.key === 'Escape' && this.curView() === 'wizard' && !this.state.confirm) this.exitWizard(); };\n    window.addEventListener('keydown', this._key);\n    requestAnimationFrame(() => this.enter());\n  }\n  componentWillUnmount() { window.removeEventListener('keydown', this._key); clearInterval(this._circ); }\n  componentDidUpdate(prevProps) {\n    if (prevProps.theme !== this.props.theme && !this.state.theme) this.applyTheme();\n  }\n\n  // ---------- animation passes ----------\n  enter() {\n    this.anim(g => {\n      const f = this.df();\n      g.fromTo('[data-viewroot]', { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: .24 * f, ease: 'power3.out', clearProps: 'transform' });\n      this.counters(g);\n      g.killTweensOf('[data-pulse]');\n      g.to('[data-pulse]', { opacity: .35, repeat: -1, yoyo: true, duration: 1.1, ease: 'sine.inOut' });\n    });\n    requestAnimationFrame(() => { this.underlines(); this.spine(); this.spinners(); this.syncChevrons(); });\n  }\n  counters(g) {\n    document.querySelectorAll('[data-count]').forEach(el => {\n      const v = parseFloat(el.getAttribute('data-count'));\n      if (isNaN(v)) return;\n      const o = { n: 0 };\n      g.to(o, { n: v, duration: .8 * this.df(), ease: 'power2.out', onUpdate: () => { el.textContent = Math.round(o.n); } });\n    });\n  }\n  underlines() {\n    ['scope', 'admin'].forEach(w => {\n      const bar = document.querySelector('[data-tabbar=\"' + w + '\"]');\n      if (!bar) return;\n      const act = bar.querySelector('[data-on=\"1\"]');\n      const u = bar.querySelector('[data-underline]');\n      if (!act || !u) return;\n      const x = act.offsetLeft + 8, wd = act.offsetWidth - 16;\n      if (window.gsap && !this.rm()) window.gsap.to(u, { x: x, width: wd, duration: .2 * this.df(), ease: 'power3.out' });\n      else { u.style.transform = 'translateX(' + x + 'px)'; u.style.width = wd + 'px'; }\n    });\n  }\n  spine() {\n    const rail = document.querySelector('[data-rail]');\n    const mk = document.querySelector('[data-stepmark=\"' + this.state.step + '\"]');\n    const fill = document.querySelector('[data-spinefill]');\n    if (!rail || !mk || !fill) return;\n    const h = Math.max(mk.offsetTop + 4, 0);\n    if (window.gsap && !this.rm()) window.gsap.to(fill, { height: h, duration: .35 * this.df(), ease: 'power2.out' });\n    else fill.style.height = h + 'px';\n  }\n  spinners() {\n    this.anim(g => {\n      g.killTweensOf('[data-spinner]');\n      document.querySelectorAll('[data-spinner]').forEach(el => {\n        g.set(el, { transformOrigin: '50% 50%' });\n        g.to(el, { rotation: '+=360', duration: 1, repeat: -1, ease: 'none' });\n      });\n    });\n  }\n  syncChevrons() {\n    const ex = this.state.expanded;\n    document.querySelectorAll('[data-chev]').forEach(el => {\n      const id = el.getAttribute('data-chev');\n      if (this.kids(id)) el.style.transform = ex[id] ? 'rotate(90deg)' : 'rotate(0deg)';\n    });\n  }\n  tabIn(which) {\n    this.anim(g => {\n      g.fromTo('[data-tabcontent=\"' + which + '\"]', { opacity: 0, y: 6 }, { opacity: 1, y: 0, duration: .18 * this.df(), ease: 'power2.out', clearProps: 'transform' });\n      this.counters(g);\n    });\n    requestAnimationFrame(() => this.underlines());\n  }\n  stepIn() {\n    this.anim(g => {\n      const f = this.df();\n      g.fromTo('[data-stepbody]', { opacity: 0, x: 14 }, { opacity: 1, x: 0, duration: .22 * f, ease: 'power3.out', clearProps: 'transform' });\n      g.from('[data-stage]', { opacity: 0, y: 8, stagger: .05 * f, duration: .2 * f, ease: 'power2.out', delay: .04, clearProps: 'transform,opacity' });\n    });\n    requestAnimationFrame(() => { this.spine(); this.spinners(); });\n  }\n\n  // ---------- navigation ----------\n  nav(view) { this.setState({ view: view, menuOpen: false, nav: false }, () => this.enter()); }\n  setScopeTab(id) { this.setState({ view: 'scope', scopeTab: id }, () => this.tabIn('scope')); }\n  setAdminTab(id) { this.setState({ adminTab: id }, () => this.tabIn('admin')); }\n  setStep(n) {\n    if (n < 1 || n > 6 || n > this.state.maxStep || this.state.provRunning) return;\n    this.setState({ step: n, menuOpen: false }, () => this.stepIn());\n  }\n  exitWizard() { this.nav('scope'); this.toast('info', 'Draft saved — resume any time from Setup'); }\n\n  // ---------- tree ----------\n  TREE() {\n    return [\n      { id: 'home', label: 'Brissie Digital overview', depth: 1, home: true },\n      { id: 'indya', label: 'indya', depth: 1, parent: null },\n      { id: 'marketing', label: 'marketing', depth: 2, parent: 'indya' },\n      { id: 'seo', label: 'seo', depth: 3, parent: 'marketing' },\n      { id: 'ads', label: 'ads', depth: 3, parent: 'marketing' },\n      { id: 'website', label: 'website', depth: 2, parent: 'indya' },\n      { id: 'redesign', label: 'redesign', depth: 3, parent: 'website' },\n      { id: 'airbuddy', label: 'airbuddy', depth: 1, parent: null },\n      { id: 'app', label: 'app', depth: 2, parent: 'airbuddy' },\n      { id: 'llmtxt', label: 'llmtxt', depth: 1, parent: null }\n    ];\n  }\n  kids(id) { return this.TREE().some(n => n.parent === id); }\n  visible(n) {\n    let p = n.parent;\n    while (p) {\n      if (!this.state.expanded[p]) return false;\n      p = (this.TREE().find(x => x.id === p) || {}).parent;\n    }\n    return true;\n  }\n  toggleNode(id, e) {\n    if (e && e.stopPropagation) e.stopPropagation();\n    const ex = Object.assign({}, this.state.expanded);\n    const opening = !ex[id];\n    ex[id] = opening;\n    this.setState({ expanded: ex }, () => {\n      this.syncChevrons();\n      this.anim(g => {\n        const chev = document.querySelector('[data-chev=\"' + id + '\"]');\n        if (chev) g.from(chev, { rotation: opening ? 0 : 90, duration: .18 * this.df(), ease: 'power2.out' });\n        if (opening) g.from('[data-under=\"' + id + '\"]', { opacity: 0, y: -6, stagger: .03 * this.df(), duration: .18 * this.df(), ease: 'power2.out', clearProps: 'transform,opacity' });\n      });\n    });\n  }\n  selectNode(id) {\n    if (id === 'home') { this.toast('info', 'Instance overview — not part of this mockup'); return; }\n    this.setState({ sel: id, view: 'scope', scopeTab: 'overview', nav: false }, () => this.enter());\n  }\n\n  // ---------- wizard actions ----------\n  copy(kind) {\n    try { navigator.clipboard.writeText('# CompanyOS interview pack — indya/marketing/seo\\n(framing answers · history digests · tree position; credential names only)'); } catch (e) {}\n    const c = Object.assign({}, this.state.copied); c[kind] = true;\n    this.setState({ copied: c }, () => {\n      this.anim(g => g.fromTo('[data-copybtn=\"' + kind + '\"]', { scale: .94 }, { scale: 1, duration: .3 * this.df(), ease: 'power3.out', clearProps: 'transform' }));\n    });\n    setTimeout(() => { const c2 = Object.assign({}, this.state.copied); delete c2[kind]; this.setState({ copied: c2 }); }, 1800);\n  }\n  simulatePaste() {\n    if (this.state.pasted) return;\n    this.setState({ pasted: true }, () => {\n      this.anim(g => g.from('[data-pre]', { opacity: 0, x: -10, stagger: .12 * this.df(), duration: .25 * this.df(), ease: 'power2.out', clearProps: 'transform,opacity' }));\n    });\n  }\n  submitReturn() {\n    if (!this.state.pasted) return;\n    this.setState({ maxStep: 5, step: 5 }, () => { this.stepIn(); this.toast('ok', 'Return parsed — 4 docs · 6 tasks · 1 provision spec'); });\n  }\n  toggleQ(i) {\n    const wasDone = this.state.qs[i].done;\n    const qs = this.state.qs.map((q, j) => j === i ? { t: q.t, done: !q.done } : q);\n    this.setState({ qs: qs, burstQ: wasDone ? null : i });\n  }\n  approve() {\n    if (!this.state.qs.every(q => q.done)) return;\n    const prov = [\n      { label: 'Register scope in registry', tag: 'registry', st: 'pending' },\n      { label: 'Create repo folders', tag: 'repo', st: 'pending' },\n      { label: 'Enable modules — dashboard · docs · canvas', tag: 'modules', st: 'pending' },\n      { label: 'Mint credential vault', tag: 'vault', st: 'pending' },\n      { label: 'Sync task board', tag: 'plane', st: 'pending' }\n    ];\n    this.setState({ step: 6, maxStep: 6, prov: prov, live: false, provRunning: true }, () => { this.stepIn(); this.runProv(0); });\n  }\n  runProv(i) {\n    const upd = (idx, st, cb) => {\n      const prov = this.state.prov.map((p, j) => j === idx ? { label: p.label, tag: p.tag, st: st } : p);\n      this.setState({ prov: prov }, cb);\n    };\n    if (i >= this.state.prov.length) {\n      this.setState({ live: true, provRunning: false }, () => {\n        this.anim(g => g.from('[data-livecard]', { opacity: 0, scale: .96, y: 8, duration: .3 * this.df(), ease: 'power3.out', clearProps: 'transform,opacity' }));\n        this.toast('ok', 'Scope indya/marketing/seo is live');\n      });\n      return;\n    }\n    upd(i, 'running', () => {\n      this.spinners();\n      setTimeout(() => upd(i, 'done', () => this.runProv(i + 1)), 620 * (this.rm() ? .3 : 1));\n    });\n  }\n\n  // ---------- feedback ----------\n  toast(status, msg) {\n    const id = 't' + Date.now() + Math.floor(Math.random() * 999);\n    this.setState({ toasts: this.state.toasts.concat([{ id: id, status: status, msg: msg }]) }, () => {\n      this.anim(g => g.from('[data-toast=\"' + id + '\"]', { x: 90, opacity: 0, duration: .26 * this.df(), ease: 'power3.out', clearProps: 'transform,opacity' }));\n    });\n    setTimeout(() => this.dismissToast(id), 4200);\n  }\n  dismissToast(id) {\n    const done = () => this.setState({ toasts: this.state.toasts.filter(t => t.id !== id) });\n    const el = document.querySelector('[data-toast=\"' + id + '\"]');\n    if (!el || this.rm() || !window.gsap) { done(); return; }\n    window.gsap.to(el, { x: 90, opacity: 0, duration: .2 * this.df(), ease: 'power2.in', onComplete: done });\n  }\n  openConfirm(cfg) {\n    this.setState({ confirm: cfg, menuOpen: false }, () => {\n      this.anim(g => g.from('[data-confirmcard]', { opacity: 0, scale: .97, y: 6, duration: .22 * this.df(), ease: 'power3.out', clearProps: 'transform,opacity' }));\n    });\n  }\n\n  // ---------- renderVals ----------\n  renderVals() {\n    const s = this.state, view = this.curView(), theme = this.curTheme();\n    const sel = s.sel;\n\n    // tree rows\n    const rows = [];\n    this.TREE().forEach(n => {\n      if (!this.visible(n)) return;\n      const hasKids = this.kids(n.id);\n      const isSel = sel === n.id && view === 'scope';\n      rows.push({\n        key: n.id, isNode: true, isMod: false, id: n.id, label: n.label,\n        indent: ((n.depth - 1) * 16) + 'px',\n        lead: n.home ? 'home' : (hasKids ? 'chev' : (isSel ? 'dot' : 'blank')),\n        leadColor: isSel && !hasKids ? 'var(--primary)' : 'var(--mutedfg)',\n        color: isSel ? 'var(--primary)' : 'var(--fg)',\n        weight: isSel ? '700' : '400',\n        under: n.parent || '',\n        onClick: () => this.selectNode(n.id),\n        onLead: hasKids ? (e) => this.toggleNode(n.id, e) : () => this.selectNode(n.id)\n      });\n      if (sel === n.id && view === 'scope') {\n        [\n          { id: 'overview', icon: 'grid', label: 'Overview' },\n          { id: 'activity', icon: 'activity', label: 'Activity' },\n          { id: 'docs', icon: 'doc', label: 'Docs' },\n          { id: 'canvas', icon: 'pen', label: 'Canvas' },\n          { id: 'setup', icon: 'cog', label: 'Setup', badge: true },\n          { id: 'tasks', icon: 'ext', label: 'Tasks', ext: true }\n        ].forEach(m => rows.push({\n          key: 'mod-' + m.id, isNode: false, isMod: true, label: m.label, icon: m.icon,\n          badge: !!m.badge, ext: !!m.ext,\n          color: s.scopeTab === m.id ? 'var(--primary)' : 'var(--mutedfg)',\n          weight: s.scopeTab === m.id ? '600' : '400',\n          onClick: m.id === 'tasks' ? () => this.toast('info', 'Tasks open in Plane (external)') : () => this.setScopeTab(m.id)\n        }));\n      }\n    });\n\n    // scope tabs\n    const scopeTabs = [\n      { id: 'overview', label: 'Overview' }, { id: 'activity', label: 'Activity' },\n      { id: 'docs', label: 'Docs' }, { id: 'canvas', label: 'Canvas' },\n      { id: 'setup', label: 'Setup' }, { id: 'access', label: 'Access' }\n    ].map(t => ({\n      label: t.label, on: s.scopeTab === t.id ? '1' : '0',\n      color: s.scopeTab === t.id ? 'var(--fg)' : 'var(--mutedfg)',\n      weight: s.scopeTab === t.id ? '500' : '400',\n      onClick: () => this.setScopeTab(t.id)\n    }));\n\n    // admin tabs\n    const adminTabs = ['overview', 'users', 'access', 'activity', 'automations', 'settings', 'health', 'mcp'].map(id => ({\n      label: id === 'mcp' ? 'MCP' : id.charAt(0).toUpper ))\n    }));\n\n    // wizard rail\n    const labels = ['Basics', 'Framing', 'History', 'Interview', 'Review', 'Provision'];\n    const rail = labels.map((lbl, i) => {\n      const n = i + 1;\n      const done = n < s.maxStep && n !== s.step;\n      const cur = n === s.step;\n      const locked = n > s.maxStep;\n      return {\n        n: n, num: (n < 10 ? '0' : '') + n, label: lbl,\n        numColor: cur ? 'var(--primary)' : (done ? 'var(--ok)' : 'var(--mutedfg)'),\n        lblColor: cur || done ? 'var(--fg)' : 'var(--mutedfg)',\n        lblWeight: cur ? '600' : '400',\n        lblLine: cur ? '2px solid var(--primary)' : '2px solid transparent',\n        cursor: locked ? 'not-allowed' : 'pointer',\n        onClick: () => this.setStep(n)\n      };\n    });\n    const railStatus = s.live ? 'live' : (s.step === 6 ? 'provisioning' : (s.maxStep >= 5 ? 'needs review' : 'waiting on interview'));\n    const wchip = s.live ? { l: 'Live', fg: 'var(--ok)', bg: 'var(--okbg)' }\n      : s.step === 6 ? { l: 'Provisioning', fg: 'var(--info)', bg: 'var(--infobg)' }\n      : s.maxStep >= 5 ? { l: 'Needs review', fg: 'var(--info)', bg: 'var(--infobg)' }\n      : { l: 'Waiting on interview', fg: 'var(--warn)', bg: 'var(--warnbg)' };\n\n    // step 3\n    const history = [\n      { path: 'indya/website', sub: '2024 site rebuild · 61 records', i: 0 },\n      { path: 'brands/indya-brand', sub: 'Voice & tone · 12 docs', i: 1 }\n    ].map(h => {\n      const on = !!s.histSel[h.i];\n      return {\n        path: h.path, sub: h.sub, sel: on,\n        bd: on ? 'color-mix(in srgb,var(--primary) 40%,transparent)' : 'var(--border)',\n        bg: on ? 'var(--selected)' : 'var(--surface)',\n        boxBd: on ? 'var(--primary)' : 'var(--borderstrong)',\n        boxBg: on ? 'var(--primary)' : 'transparent',\n        onClick: () => { const hs = Object.assign({}, s.histSel); hs[h.i] = !hs[h.i]; this.setState({ histSel: hs }); }\n      };\n    });\n\n    // step 5\n    const arts = [\n      { title: ' nfirm({\n        title: 'Revoke key ' + k.alias + '?',\n        body: 'Agents using ' + k.alias + ' lose access immediately. Usage history is kept.',\n        label: 'Revoke key',\n        run: () => {\n          this.setState({ keys: this.state.keys.filter(x => x.alias !== k.alias) });\n          this.toast('ok', 'Key ' + k.alias + ' revoked');\n        }\n      })\n    }));\n\n    // breadcrumbs\n    const pathMap = {\n      seo: ['indya', 'marketing', 'seo'], ads: ['indya', 'marketing', 'ads'],\n      marketing: ['indya', 'marketing'], website: ['indya', 'website'], redesign: ['indya', 'website', 'redesign'],\n      indya: ['indya'], airbuddy: ['airbuddy'], app: ['airbuddy', 'app'], llmtxt: ['llmtxt']\n    };\n    const parts = pathMap[sel] || ['indya', 'marketing', 'seo'];\n    const crumbs = parts.map((p, i) => ({\n      label: p, sep: i < parts.length - 1,\n      color: i === parts.length - 1 ? 'var(--fg)' : 'var(--mutedfg)',\n      weight: i === parts.length - 1 ? '600' : '400'\n    }));\n\n    const toasts = s.toasts.map(t => ({\n      id: t.id, msg: t.msg,\n      edge: t.status === 'ok' ? 'var(--ok)' : (t.status === 'warn' ? 'var(--warn)' : 'var(--info)'),\n      icon: t.status === 'ok' ? 'check' : (t.status === 'warn' ? 'alert' : 'info'),\n      onClose: () => this.dismissToast(t.id)\n    }));\n\n    return {\n      // shell\n      isScope: view === 'scope', isWizard: view === 'wizard', isAdmin: view === 'admin',\n      treeRows: rows, crumbs: crumbs,\n      themeModes: [\n        { id: 'auto', title: 'Auto (Circadian)', bg: 'linear-gradient(135deg,#f2eee7 50%,#1c1a17 50%)' },\n        { id: 'light', title: 'Light — Terrazzo Quiet', bg: '#f2eee7' },\n        { id: 'green', title: 'Dark — Green Hall', bg: '#17382b' },\n        { id: 'charcoal', title: 'Dark — Charcoal', bg: '#262320' }\n      ].map(m => ({\n        title: m.title, bg: m.bg,\n        ring: theme === m.id ? 'var(--primary)' : 'var(--borderstrong)',\n        shadow: theme === m.id ? '0 0 0 2px in → Activity.',\n        label: 'Dismiss',\n        run: () => { this.nav('scope'); this.toast('warn', 'Setup dismissed'); }\n      }),\n      s1: step === 1, s2: step === 2, s3: step === 3, s4: step === 4, s5: step === 5, s6: step === 6,\n      framing: [\n        { q: 'What does success look like in 90 days?', a: 'Top-10 rankings for 12 priority keywords; organic sessions +40%.' },\n        { q: 'Who is the primary human contact?', a: 'Priya Nair (account lead).' },\n        { q: 'Which existing playbooks apply?', a: 'playbooks/seo-retainer v3.' }\n      ],\n      history: history,\n      reuse: s.reuse,\n      toggleReuse: () => this.setState({ reuse: !s.reuse }),\n      reuseBd: s.reuse ? 'color-mix(in srgb,var(--primary) 40%,transparent)' : 'var(--border)',\n      reuseBg: s.reuse ? 'var(--selected)' : 'var(--surface)',\n      reuseBoxBd: s.reuse ? 'var(--primary)' : 'var(--borderstrong)',\n      reuseBoxBg: s.reuse ? 'var(--primary)' : 'transparent',\n      copyPack: () => this.copy('pack'), copyMcp: () => this.copy('mcp'),\n      packLabel: s.copied.pack ? 'Copied' : 'Copy pack',\n      packIcon: s.copied.pack ? 'check' : 'copy',\n      packBg: s.copied.pack ? 'var(--ok)' : 'var(--primary)',\n      packFg: 'var(--primaryfg)',\n      mcpLabel: s.copied.mcp ? 'Copied' : 'Copy MCP variant',\n      mcpIcon: s.copied.mcp ? 'check' : 'copy',\n      mcpFg: s.copied.mcp ? 'var(--ok)' : 'var(--fg)',\n      pasted: s.pasted, notPasted: !s.pasted,\n      simulatePaste: () => this.simulatePaste(),\n      arts: arts, questions: questions, qLeft: qLeft,\n      prov: prov, live: s.live,\n      provTitle: s.live ? 'Provisioned' : (s.provRunning ? 'Provisioning…' : 'Provision & credentials'),\n      provChipFg: s.live ? 'var(--ok)' : 'var(--info)',\n      provChipBg: s.live ? 'var(--okbg)' : 'var(--infobg)',\n      addCred: () => this.toast('ok', 'AHREFS_TOKEN saved to the vault'),\n      backVis: step > 1 && step < 6 ? 'visible' : 'hidden',\n      goBack: () => this.setStep(step - 1),\n      primaryLabel: primaryLabel,\n      primaryOp: primaryEnabled ? '1' : '.45',\n      primaryCursor: primaryEnabled ? 'pointer' : 'not-allowed',\n      primaryAction: () => { if (primaryEnabled) primaryAction(); },\n\n      // admin\n      adminTabs: adminTabs,\n      aOverview: s.adminTab === 'overview', aUsers: s.adminTab === 'users', aActivity: s.adminTab === 'activity',\n      aEmpty: !!aE,\n      aEmptyIcon: aE ? aE.icon : 'info', aEmptyTitle: aE ? aE.title : '', aEmptyBody: aE ? aE.body : '',\n      users: users, keys: keys,\n      createKey: () => this.toast('ok', 'Key drafted — set a budget to activate it'),\n\n      // feedback\n      toasts: toasts,\n      hasConfirm: !!s.confirm,\n      confirmTitle: s.confirm ? s.confirm.title : '',\n      confirmBody: s.confirm ? s.confirm.body : '',\n      confirmLabel: s.confirm ? s.confirm.label : '',\n      cancelConfirm: () => this.setState({ confirm: null }),\n      runConfirm: () => { const c = s.confirm; this.setState({ confirm: null }, () => { if (c && c.run) c.run(); }); },\n      swallow: (e) => { if (e && e.stopPropagation) e.stopPropagation(); }\n    };\n  }\n\n  setStepForce(n) { this.setState({ step: Math.min(n, 6), menuOpen: false }, () => this.stepIn()); }\n  flipUser(name) {\n    this.setState({ users: this.state.users.map(u => u.name === name ? { name: u.name, role: u.role, on: !u.on } : u) });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
