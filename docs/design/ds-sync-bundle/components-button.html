<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>CompanyOS — Button</title>
<style>
:root{
  --surface:#fff;--foreground:#0f172a;--muted:#e9eef6;--border:#e2e8f0;
  --primary:#1e40af;--primary-foreground:#fff;--destructive:#dc2626;--ring:#1e40af;
  --radius-sm:6px;--space-2:8px;--space-4:16px;--font-size-md:16px;
}
.dark{--surface:#111a2e;--foreground:#e2e8f0;--muted:#1b2740;--border:#243352;
  --primary:#3b82f6;--primary-foreground:#0b1220;--destructive:#f87171;--ring:#3b82f6}
body{font-family:Inter,system-ui,sans-serif;margin:0;padding:0;display:grid;grid-template-columns:1fr 1fr}
.pane{padding:24px;display:flex;flex-direction:column;gap:12px;align-items:flex-start}
.pane.light{background:#f8fafc}.pane.dark{background:#0b1220}
h2{font-size:13px;font-weight:600;margin:0;color:var(--foreground)}
.btn{display:inline-flex;min-height:44px;cursor:pointer;align-items:center;justify-content:center;
  border-radius:var(--radius-sm);padding:var(--space-2) var(--space-4);font-size:var(--font-size-md);
  font-weight:500;border:none;transition:background-color .2s ease-out,box-shadow .2s ease-out;font-family:inherit}
.btn:focus-visible{outline:2px solid var(--ring);outline-offset:2px}
.btn:disabled{cursor:not-allowed;opacity:.5}
.btn-primary{background:var(--primary);color:var(--primary-foreground)}
.btn-primary:hover{filter:brightness(1.1)}
.btn-secondary{border:1px solid var(--border);background:var(--surface);color:var(--foreground)}
.btn-secondary:hover{background:var(--muted)}
.btn-destructive{background:var(--destructive);color:var(--primary-foreground)}
.spec{font-family:ui-monospace,monospace;font-size:11px;color:#64748b}
</style>
</head>
<body>
<div class="pane light">
  <h2>Button — packages/ui (light)</h2>
  <button class="btn btn-primary">Create scope</button>
  <button class="btn btn-secondary">Cancel</button>
  <button class="btn btn-destructive">Revoke access</button>
  <button class="btn btn-primary" disabled>Create scope</button>
  <span class="spec">min-height 44px · radius-sm · font-md 500 · focus ring --ring offset 2 · disabled 50%</span>
</div>
<div class="pane dark">
  <h2 style="color:#e2e8f0">Button — dark</h2>
  <button class="btn btn-primary">Create scope</button>
  <button class="btn btn-secondary">Cancel</button>
  <button class="btn btn-destructive">Revoke access</button>
  <button class="btn btn-primary" disabled>Create scope</button>
</div>
</body>
</html>
