version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: companyos-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-companyos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-companyos}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - companyos-dev

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: companyos-litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-1234567890abcdef1234567890abcdef}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-companyos}:${POSTGRES_PASSWORD:-devpassword123}@postgres:5432/litellm
      - STORE_MODEL_IN_DB=True
      - LITELLM_LOG=INFO
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./litellm.config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health', timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - companyos-dev

networks:
  companyos-dev:
    driver: bridge

volumes:
  postgres_data:
