version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: companyos-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-companyos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-companyos}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - companyos-dev

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: companyos-litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-1234567890abcdef1234567890abcdef}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-companyos}:${POSTGRES_PASSWORD:-devpassword123}@postgres:5432/litellm
      - STORE_MODEL_IN_DB=True
      - LITELLM_LOG=INFO
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LITELLM_EMBED_MODEL=${LITELLM_EMBED_MODEL:-openai/text-embedding-3-small}
    volumes:
      - ./litellm.config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health', timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - companyos-dev

  n8n:
    image: n8nio/n8n:2.25.3
    container_name: companyos-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-n8n}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-devn8npass123}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-UTC}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      # default sqlite inside container; isolated from companyos postgres
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - companyos-dev

networks:
  companyos-dev:
    driver: bridge

volumes:
  postgres_data:
  n8n_data:
