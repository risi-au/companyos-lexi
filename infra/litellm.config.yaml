# infra/litellm.config.yaml
# LiteLLM proxy config for CompanyOS dev/prod parity.
# Role aliases only — never reference raw models in code/workflows.
# Keys loaded via os.environ (no secrets committed).
#
# Current routing (2026-07): Moonshot/Kimi is the only provider with a live
# key. When Anthropic/DeepSeek keys arrive, re-point aliases here — nothing
# else in the system changes.

model_list:
  - model_name: cheap
    litellm_params:
      model: moonshot/kimi-k2.5
      api_key: os.environ/MOONSHOT_API_KEY
      api_base: https://api.moonshot.ai/v1
  - model_name: analysis
    litellm_params:
      model: moonshot/kimi-k2.6
      api_key: os.environ/MOONSHOT_API_KEY
      api_base: https://api.moonshot.ai/v1
  - model_name: reasoning
    litellm_params:
      model: moonshot/kimi-k2.6
      api_key: os.environ/MOONSHOT_API_KEY
      api_base: https://api.moonshot.ai/v1
  - model_name: code
    litellm_params:
      model: moonshot/kimi-k2.7-code
      api_key: os.environ/MOONSHOT_API_KEY
      api_base: https://api.moonshot.ai/v1
  - model_name: embed
    litellm_params:
      model: os.environ/LITELLM_EMBED_MODEL
      api_key: os.environ/OPENAI_API_KEY

litellm_settings:
  set_verbose: false
  drop_params: true
  # per-key spend tracking + budgets enabled via DB (litellm db) + virtual keys

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # database_url set via env for key management + spend tracking
  # budgets configured per virtual key at runtime (via /key/generate etc)
